defaults:
  - base

type: if_data
scenarios_per_topic: 40    # IF 不分 topic，只用 if_categories
dialogues_per_scenario: 1
tasks_per_dialogue: 4      # 每段對話串接 3~6 個 IF 任務（random）
min_tasks: 3
max_tasks: 6

roles:
  instructor: "甲"
  executor: "乙"

if_categories:
  - name: 朗讀
    desc: 甲請乙朗讀一段文字或一個句子
  - name: 數數
    desc: 甲請乙從某個數字數到另一個數字
  - name: 序列
    desc: 甲請乙說出某個序列（例：星期一到星期日）
  - name: 倒序
    desc: 甲請乙倒著說出某個序列
  - name: 列舉
    desc: 甲請乙列出某個類別的幾個例子
  - name: 重複
    desc: 甲請乙重複說一句話
  - name: 注音拼讀
    desc: 甲請乙說出某個字的注音
  - name: 數字朗讀
    desc: 甲請乙用中文說出某個數字
  - name: 時間日期朗讀
    desc: 甲請乙說出某個時間或日期
  - name: 格式限制
    desc: 甲要求乙用特定格式回答（例：只說三個字）
  - name: 否定限制
    desc: 甲要求乙回答時不可包含某個詞
  - name: 必要詞彙
    desc: 甲要求乙的回答必須包含某個詞
  - name: 詞彙抽取
    desc: 甲請乙從一段文字中找出某類詞彙
  - name: 替換
    desc: 甲請乙把某個詞換成另一個詞再說一遍
  - name: 過濾
    desc: 甲請乙從列表中去掉某些項目
  - name: 選擇
    desc: 甲給幾個選項，請乙選一個
  - name: 排序
    desc: 甲給幾個項目，請乙依某個標準排序
  - name: 比較
    desc: 甲請乙比較兩個東西的差異
  - name: 完成句子
    desc: 甲說前半句，請乙接後半句
  - name: 轉換
    desc: 甲請乙把某段話改成另一種說法
  - name: 短篇描述
    desc: 甲請乙用一兩句話描述某個東西
  - name: 短篇生成
    desc: 甲請乙造一個句子或短語
  - name: 簡單計算
    desc: 甲請乙做簡單加減乘除（用中文說出答案）
  - name: 條件推理
    desc: 甲給一個條件，請乙推斷結果
  - name: 多步驟推理
    desc: 甲請乙完成需要多個步驟的推理任務

prompts:
  dialogue: |
    你是一位擅長設計語言任務的編劇。

    任務：生成一段 {num_turns} 輪的對話。
    甲（出題者）依序出 {num_tasks} 個不同的語言指令任務，乙（執行者）照著做。
    兩人的口氣要自然，像真人在互動，不要像考試題目。

    要使用的任務類別（依序）：{task_list}

    規則（超硬性）：
    - 語言：繁體中文台灣口語，絕對不可出現任何英文字母或阿拉伯數字。
    - 數字一律用中文（例：一、二、三、四、五）。
    - 內容要跟台灣日常有關（可以用台灣地名、食物、習俗等）。
    - 每輪最多六十個字，讀起來不超過三十秒。
    - 乙的回答要符合甲的指令，不要多說廢話。
    - 甲的指令句每次要稍微不同（不要每次都說「請你⋯⋯」）。
    - 禁止：Markdown、條列、網址、括號說明、旁白。

    對話範例風格（僅供參考）：
    甲：你來唸一下這句話：台灣的珍珠奶茶聞名世界。
    乙：台灣的珍珠奶茶聞名世界。
    甲：好，接著，從一數到五。
    乙：一、二、三、四、五。
    甲：現在列出三種台灣夜市小吃。
    乙：鹹酥雞、蚵仔煎、滷肉飯。

    輸出格式（超硬性）：
    - 只輸出對話本文。
    - 每行格式：「甲：...」或「乙：...」。
    - 禁止同一回合換行，禁止空白行。
    - 從甲開始，甲乙交替，共 {num_turns} 行（num_turns = num_tasks * 2）。
