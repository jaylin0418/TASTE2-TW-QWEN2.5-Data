defaults:
  - base

type: if_data
min_tasks: 3
max_tasks: 6

roles:
  instructor: "甲"
  executor: "乙"

# 對齊 TASTE-IF-SFT-48K 的 25 個 instruction_type
if_categories:
  - name: 朗讀
    desc: 甲給出一段文字或句子，請乙原文唸出來
  - name: 數數
    desc: 甲請乙從某個數字數到另一個數字（例：從三數到八）
  - name: 序列
    desc: 甲請乙依序說出某個固定序列（例：星期一到星期日、一月到十二月）
  - name: 倒序
    desc: 甲請乙將某個序列或句子倒著說
  - name: 列舉
    desc: 甲請乙說出某類別的若干個例子（例：列出三種蔬菜）
  - name: 重複
    desc: 甲說一句話，請乙完整重複一遍（或重複指定次數）
  - name: 拼讀
    desc: 甲給一個詞，請乙逐字唸出每個字（例：「蘋果」→「蘋、果」）
  - name: 數字朗讀
    desc: 甲給出一個數字，請乙用中文朗讀（例：一千兩百三十四）
  - name: 時間日期朗讀
    desc: 甲給出一個時間或日期，請乙用中文唸出來
  - name: 格式限制
    desc: 甲要求乙的回答必須符合特定格式（例：只說兩個字、用問句回答）
  - name: 否定限制
    desc: 甲要求乙的回答中不可出現某個詞或詞類
  - name: 必要詞彙
    desc: 甲要求乙的回答必須包含某個指定詞
  - name: 詞彙抽取
    desc: 甲給一段文字，請乙找出其中的特定詞類（例：找出所有名詞）
  - name: 替換
    desc: 甲給一段文字，請乙將某個詞換成另一個詞後再說一遍
  - name: 過濾
    desc: 甲給一個列表，請乙去掉不符合條件的項目後說出剩餘部分
  - name: 選擇
    desc: 甲提供幾個選項，請乙選出符合條件的一個或多個
  - name: 排序
    desc: 甲給幾個項目，請乙依指定標準（大小、時間、筆劃等）重新排序
  - name: 比較
    desc: 甲請乙比較兩個事物的異同或大小
  - name: 完成句子
    desc: 甲說前半句，請乙接後半句補完
  - name: 轉換
    desc: 甲給一段話，請乙改成另一種說法（例：肯定句改否定句、縮短為一句）
  - name: 短篇描述
    desc: 甲請乙用一兩句話描述某個人、事、物或場景
  - name: 短篇生成
    desc: 甲請乙造一個句子、說一句祝賀語或生成一小段文字
  - name: 簡單計算
    desc: 甲請乙做簡單加減乘除，用中文說出答案
  - name: 條件推理
    desc: 甲給出一個假設條件，請乙推斷符合條件的結果
  - name: 多步驟
    desc: 甲給出需要依序完成多個動作的指令，乙依序執行

prompts:
  dialogue: |
    生成一段對話，甲依序出 {num_tasks} 個語言指令任務，乙精準執行。

    任務類別（依序）：{task_list}

    任務說明（每個類別的定義）：
    - 朗讀：甲給出文字，乙原文唸出
    - 數數：乙從X數到Y
    - 序列：乙說出固定序列（月份、星期等）
    - 倒序：乙將序列或句子倒著說
    - 列舉：乙列出N個某類別的例子
    - 重複：乙完整重複甲說的話
    - 拼讀：乙逐字唸出詞語的每個字
    - 數字朗讀：乙用中文唸出數字
    - 時間日期朗讀：乙用中文唸出時間或日期
    - 格式限制：乙的回答符合指定格式
    - 否定限制：乙的回答不含指定詞
    - 必要詞彙：乙的回答包含指定詞
    - 詞彙抽取：乙找出文字中的特定詞類
    - 替換：乙將文字中某詞替換後說出
    - 過濾：乙從列表去掉不符項目後說出剩餘
    - 選擇：乙從選項中選出符合條件者
    - 排序：乙將項目依標準重排後說出
    - 比較：乙比較兩個事物的異同
    - 完成句子：乙接後半句補完
    - 轉換：乙將話改成另一種說法
    - 短篇描述：乙用一兩句描述某人事物
    - 短篇生成：乙造句或生成短文字
    - 簡單計算：乙做加減乘除並說出答案
    - 條件推理：乙根據條件推斷結果
    - 多步驟：乙依序完成多個動作

    規則：
    - 語言：繁體中文，不可出現英文字母或阿拉伯數字。
    - 數字一律用中文。
    - 內容選材自然，不要刻意強調地名或食物。
    - 每輪最多六十個字。
    - 乙的回答要精準符合指令，不多說廢話。
    - 甲的指令措辭每次要不同（不要每次都說「請你」開頭）。
    - 禁止：Markdown、條列符號、括號說明、旁白。

    範例（風格參考，不要照抄）：
    甲：你把這句話唸一遍：學而時習之，不亦說乎。
    乙：學而時習之，不亦說乎。
    甲：好，從一數到十。
    乙：一、二、三、四、五、六、七、八、九、十。
    甲：說出三種交通工具。
    乙：公車、火車、飛機。

    輸出格式（嚴格遵守）：
    - 只輸出對話本文，不要任何說明。
    - 每行格式：「甲：...」或「乙：...」。
    - 禁止同一回合換行，禁止空白行。
    - 從甲開始，甲乙交替，共 {num_turns} 行。
