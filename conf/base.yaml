# ═══════════════════════════════════════════════════════════════════════════
# BASE CONFIG — shared across all data types
# ═══════════════════════════════════════════════════════════════════════════

# ── vLLM ────────────────────────────────────────────────────────────────────
vllm:
  base_url: "http://localhost:8000/v1"
  api_key: "token"
  model: "Qwen/Qwen2.5-32B-Instruct"
  timeout: 120
  max_retries: 5
  retry_delay: 2.0

# ── Generation params ────────────────────────────────────────────────────────
gen:
  temperature: 0.85
  top_p: 0.9
  max_tokens: 2048
  repetition_penalty: 1.15  # prevent loop repetition common in Qwen2.5-7B

# ── Dialogue structure ───────────────────────────────────────────────────────
dialogue:
  min_turns: 8
  max_turns: 14          # 每次 random 取 8~14 的偶數
  max_chars_per_turn: 60 # 每輪最多 60 字
  max_tts_sec: 30        # 每輪 TTS 不超過 30 秒

# ── Backchannel ──────────────────────────────────────────────────────────────
backchannel_rate: 0.15  # 非首輪甲（User/甲）有此機率被強制短回應

# ── TTS ─────────────────────────────────────────────────────────────────────
tts:
  sample_rate: 24000
  indextts_repo_dir: /work/jaylin0418/cog-IndexTTS-2
  indextts_model_dir: /work/jaylin0418/cog-IndexTTS-2/checkpoints
  cv_pool: /work/jaylin0418/common_voice_zh_TW/pool/cv_pool.json
  ref_audio_dir: /home/jaylin0418/SpeechLab/ref_audio/eleven_lab_emotion
  breezy_repo: /home/jaylin0418/SpeechLab/tts_model/BreezyVoice
  breezy_python: /home/jaylin0418/miniconda3/envs/breezyvoice_py310/bin/python
  breezy_model: /home/jaylin0418/SpeechLab/tts_model/BreezyVoice/checkpoints/hf_cache/models--MediaTek-Research--BreezyVoice-300M/snapshots/e33b502e0ac21c16b0ee0d00df66ac3fa737393d

# ── Speed stretch ─────────────────────────────────────────────────────────────
speed:
  fast_factor: 0.77
  slow_factor: 1.33

# ── Output ───────────────────────────────────────────────────────────────────
output:
  base_dir: /work/jaylin0418/TASTE2-TW-QWEN2.5-Data/output

