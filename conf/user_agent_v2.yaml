defaults:
  - base

type: user_agent
scenarios_per_topic: 200
dialogues_per_scenario: 1

# v2：情境更具體、助理更主動分享觀點、允許更多口語化短句
roles:
  user: "甲"
  agent: "乙"

gen:
  temperature: 0.90   # 比 v1 略高，增加多樣性
  top_p: 0.92

prompts:
  scenario: |
    你是一位台灣本土影集的編劇，專門寫貼近真實生活的劇情情境。

    任務：以「{topic}」為主題，構思 {n} 個具體、有趣、有點小戲劇性的台灣日常對話情境。
    語言：繁體中文（台灣口語），絕對不可出現任何英文字母。

    每個情境要有：
    - 明確的地點（捷運站、夜市、辦公室、手搖飲料店、便利商店等）
    - 兩個有個性的角色（不只是「使用者」和「助理」，要像真實的人）
    - 一個具體的小問題或狀況（不要太大，就是日常會遇到的那種）

    規則：
    - 三到四句描述，禁止出現對話內容。
    - 禁止英文字母、阿拉伯數字；時間地名用中文。
    {taiwan_hints}

    輸出格式（嚴格遵守）：
    - 只輸出純 JSON，不要任何說明或 code block。
    - 格式：{{"scenarios": [{{"id": "s001", "description": "..."}}, ...]}}
    - scenarios 陣列長度必須等於 {n}，id 從 s001 連號。
    - description 不可含換行字元。

  system_prompt: |
    你是一位台灣本土影集的編劇。

    任務：根據以下情境，寫一段系統提示詞給助理（乙），讓乙在這個情境裡有鮮明的個性。

    情境：{scenario}

    規則：
    - 只輸出系統提示詞本文，不要標籤。
    - 最多三句話，繁體中文，絕對不可出現英文字母。
    - 乙要有個人意見和想法，不是只會回答問題。
    - 乙說話直接、有點隨性，偶爾吐槽，但還是會幫忙解決問題。

  dialogue: |
    你是一位台灣本土影集的編劇，要寫一段生動、有個性的日常對話。

    情境：{scenario}
    角色設定：{system_prompt}

    任務：生成 {num_turns} 輪對話。甲有問題想解決，乙幫忙但也有自己的想法。

    風格規則（超硬性）：
    - 語言：繁體中文台灣口語，絕對不可出現任何英文字母或阿拉伯數字。
    - 數字用中文，時間地名用台灣習慣說法。
    - 每輪最多六十個字，讀起來不超過三十秒。
    - 鼓勵：吐槽、反問、個人意見、台灣口頭禪（欸、哦、蠻、超、好啦）。
    - 乙不要一直反問；有時直接說「我覺得⋯⋯」或「你可以⋯⋯」。
    - 允許短回應（好啊、嗯嗯、欸真的、哈哈）。
    - 禁止：客服口吻、Markdown、條列、網址、括號說明、旁白。
    {taiwan_hints}

    輸出格式（超硬性）：
    - 只輸出對話本文。
    - 每行格式：「甲：...」或「乙：...」。
    - 禁止同一回合換行，禁止空白行。
    - 從甲開始，甲乙交替，共 {num_turns} 行。
