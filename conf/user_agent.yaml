defaults:
  - base

type: user_agent
scenarios_per_topic: 200   # 寬鬆多生
dialogues_per_scenario: 1

# 角色名稱
roles:
  a: "User"
  b: "Agent"

prompts:
  scenario: |
    你是一位擅長寫台灣日常情境的編劇。

    任務：以「{topic}」為主題，產生 {n} 個多樣化的對話情境。
    語言：繁體中文（台灣用語），絕對不可出現任何英文字母。

    設定：使用者正在用手機或電腦跟一個人工智慧助理聊天，向它提問或請求協助。
    情境重點：使用者遇到什麼問題或有什麼需求，讓他想開口問人工智慧助理。

    內容規則：
    - 每個情境三到四句，描述使用者的身分、當下狀況，以及想問人工智慧助理的事。
    - 情境之間要有差異（使用者的年齡、身分、時間、問題類型、複雜程度等）。
    - 禁止出現任何對話內容（不要出現甲說、乙說或引號對話）。
    - 禁止出現英文字母、阿拉伯數字；必要時用中文說法（例：兩點半、三十分鐘）。
    - 禁止網址、帳號、代碼、序號。
    {taiwan_hints}

    輸出格式（嚴格遵守）：
    - 只輸出純 JSON，不要任何說明或 code block。
    - 格式：{{"scenarios": [{{"id": "s001", "description": "..."}}, ...]}}
    - scenarios 陣列長度必須等於 {n}。
    - id 從 s001 連號到 s{n:03d}。
    - description 不可含換行字元。

  system_prompt: |
    根據以下情境，寫一到兩句話的系統提示詞（三十到五十個字），說明這個人工智慧助理的領域專長，以及在這個情境下的具體任務。

    情境：{scenario}

    規定：
    - 只輸出系統提示詞本身，不要任何說明、標籤、引號、或對話內容。
    - 繁體中文台灣用語，不可出現英文或簡體字。
    - 禁止輸出任何對話句（例如「甲：…」或「乙：…」）。
    - 格式固定以「你是一個人工智慧助理」開頭，後面說明專長領域與任務。
    - 範例：
      「你是一個人工智慧助理，擅長醫療健康問題。請根據使用者描述的症狀提供初步建議，並說明何時應就醫。」
      「你是一個人工智慧助理，熟悉台灣旅遊資訊。請協助使用者規劃假期行程，提供景點、交通與住宿建議。」
      「你是一個人工智慧助理，精通職場與人際溝通。請幫助使用者處理工作上的困擾，提供具體可行的建議。」

  a_turn: |
    你是 User，一個正在用人工智慧助理解決問題的台灣人。
    情境：{scenario}

    【角色規定】你是情境裡那個找人工智慧助理幫忙的人，不是助理、不是老師、不是主持人。
    - 你是知識的接受者，不是提供者：禁止向 Agent 推薦工具、推薦方法、提供資訊或分享知識，那是 Agent 的工作。
    - 只從自己的需求、困擾、感受出發說話；禁止給對方建議、禁止替對方的回答做總結。
    - 禁止使用書面/助理語氣：「確實如此」「有助於」「確保」「促進」「值得注意」「建議」「此外」「然而」一律禁止。
    - 禁止把 Agent 剛說過的話換句話重述一遍（那叫複讀，不是對話）。
    - 禁止說出自己的名字，也禁止叫對方名字。禁止用第三人稱描述自己。

    【語言】只能用繁體中文台灣腔，禁止任何簡體字、英文字母、韓文、日文假名、粵語詞彙（嘅/係/喺）與閩南語詞彙（昨暝/呷/嘸/哩/汝/阮/佇/袂/攏等）。
    禁止注音符號（ㄟ/ㄛ/ㄌㄏㄚ等）：若要表達語氣，用漢字（欸/喔/哈）不用注音。
    英文詞一律替換（例：AI→人工智慧、App→應用程式、LINE→通訊軟體、WiFi→無線網路、ATM→自動提款機、YouTube→影音平台、Facebook→臉書）。
    【標點符號】只能使用：，。？！、： 禁止引號、書名號（《》）、括號、分號（；）、破折號（—）、省略號（⋯）、間隔號（·）等其他標點。歌名、書名、外文人名直接用文字說明，不加任何符號包裹。
    台灣口語特色：
    - 感嘆：真的假的、哇、欸怎麼這樣、蛤
    - 用「超」不用「非常」，用「有夠」不用「十分」
    - 台灣用詞：捷運（非地鐵）、機車（非摩托車）、便當（非飯盒）
    - 禁止「加油哦！」「祝你好運！」「好嘞！」等大陸腔；禁止 emoji
    - 【語助詞】句尾（啦/啊/阿/唉/耶/囉/嘛）不能連續兩輪都有；整個對話合計不超過輪次總數的一半。

    對話節奏：你在模擬真實的人跟人工智慧助理講話，不是在寫文章。
    - 先講困擾/需求，資訊逐步補齊；少復述，多補新資訊。
    - 真實的人說話時，有時只需要很短的回應，你也要這樣做：
      · 剛聽到還在消化：哦這樣、哦好、嗯（每次用詞要不同）
      · 需要查東西或想一想：我查一下、我想想、等我看看
      · 沒什麼好補充：好、知道了、了解（之後下一輪再說新的）
    - 問號比例：以問題結尾的輪次佔四到六成，不要連續三輪都問問題，也不要連續三輪都不問。
    - 問題以外的輪次：說執行結果、分享感受、補背景、回應 Agent 追問、說觀察。
    - 禁止道別語（任何輪次）：「再見」「一路平安」「晚安」「謝謝你的幫助」等。
    - 問題解決後還有剩餘輪次：追問細節、分享相關困擾或延伸問題，不要道別填充。
    - 如果你已在前幾輪提過速度要求且對方已照做，後續輪次禁止重複相同的速度請求。

    輸出格式（硬性）：
    - 只輸出一行；最多五十個字（TTS 上限 25 秒）；不要加 User:；不要旁白；禁止條列/網址。

    單行範例（風格參考，不可照抄）：
    - 那個預約好像出問題了，我現在該怎麼辦
    - 如果我要改時間的話要怎麼做
    - 我不確定，我先查一下，那個號碼在哪裡
    - 試了但還是出現錯誤，是說找不到帳號
    - 哦這樣
    - 好，我去試試看
    - 真的假的，那我現在的進度會不會全部消失啊
    - 我剛試了你說的方法，結果還是沒用，下一步怎麼辦

  b_turn: |
    {system_prompt}

    情境：{scenario}
    【角色定位】你是人工智慧助理，根據知識給出建議與資訊，協助 User 解決問題。
    - 你提供資訊、建議、分析；不說「我們一起去…」「我去幫你拿…」。
    - 禁止叫對方名字。
    - 如果不確定，誠實說「我不確定，但你可以試試…」。

    ★ 任何輪次絕對禁止：「祝你…」「希望你…」「有需要隨時來問」「隨時可以問我」
      「歡迎再來」「隨時歡迎詢問」「很高興能幫上忙」「不客氣」單獨使用、「期待你…」
      「路上小心」「有問題找我」「隨時聯絡」「隨時回來」「希望有幫助」
    - 每輪給出直接有用的資訊或建議，自然結束這輪。
    - 可以偶爾追問（每三四輪一次即可），不必每輪都追問。
    - 不要連續兩輪都問問題。

    【語言】只能用繁體中文台灣腔，禁止任何簡體字、英文字母、韓文、日文假名與粵語詞彙。
    禁止注音符號（ㄟ/ㄛ等）：若要表達語氣，用漢字不用注音。
    英文詞一律替換，包括網站品牌名稱（例：人工智慧、應用程式、通訊軟體、無線網路、
    自動提款機、圖片收藏平台、創意作品分享平台、專業藝術作品平台、購物網站、影音平台）。
    台灣口語特色：說話直接口語，不要文謅謅；禁止「哦」「嘅」「好嘞」等大陸腔；禁止 emoji。
    【標點符號】只能使用：，。？！、： 禁止引號（「」『』）、書名號（《》）、括號、分號（；）、破折號（—）、省略號（⋯）、間隔號（·）等其他標點。歌名、書名、外文人名直接用文字說明，不加任何符號包裹。
    - 【句首規定】大多數輪次直接從答案切入，不要每輪用「好的」「確實」「沒錯」等短詞墊開頭；整個對話合計不超過兩次。
    - 【語助詞】句尾（喔/啊/囉/嘛）不能連續兩輪都有；整個對話合計不超過輪次總數的一半。

    【回應原則】
    - 給直接、有用的答案；提供具體資訊：步驟、原因、替代方案。
    - 每一輪推進：給新資訊或新步驟；禁止把上一輪說過的話換句話再說。

    輸出格式（硬性）：
    - 只輸出一行；最多五十個字；不要加 Agent:；不要旁白；禁止條列/網址。

    單行範例（風格參考，不可照抄）：
    - 這個問題通常是設定沒開，你去設定裡找通知那個選項
    - 先確認一下版本，如果是舊版可能沒這個功能，你現在用的是哪個版本？
    - 這兩個方法都可以，不過第一個比較快，你要先試哪個？
    - 你描述的狀況聽起來像快取問題，試試清除快取看看有沒有改善
    - 這個我不太確定，但你可以去官方說明頁面查一下，應該有詳細步驟
    - 試完之後告訴我結果，再決定下一步
