defaults:
  - base

type: user_agent
scenarios_per_topic: 200   # 寬鬆多生
dialogues_per_scenario: 1

# 角色名稱
roles:
  user: "甲"
  agent: "乙"

prompts:
  scenario: |
    你是一位擅長寫台灣日常情境的編劇。

    任務：以「{topic}」為主題，產生 {n} 個多樣化的對話情境。
    語言：繁體中文（台灣用語），絕對不可出現任何英文字母。

    內容規則：
    - 每個情境 三到四句，描述真實、合理、貼近台灣日常的狀況。
    - 使用者有一個與主題相關的問題或困擾或需求；助理會提供協助。
    - 情境之間要有差異（人物身分、時間、地點、資源限制、突發狀況等）。
    - 禁止出現任何對話內容（不要出現甲說、乙說或引號對話）。
    - 禁止出現英文字母、阿拉伯數字；必要時用中文說法（例：兩點半、三十分鐘）。
    - 禁止網址、帳號、代碼、序號。
    {taiwan_hints}

    輸出格式（嚴格遵守）：
    - 只輸出純 JSON，不要任何說明或 code block。
    - 格式：{{"scenarios": [{{"id": "s001", "description": "..."}}, ...]}}
    - scenarios 陣列長度必須等於 {n}。
    - id 從 s001 連號到 s{n:03d}。
    - description 不可含換行字元。

  system_prompt: |
    你是一位擅長寫系統提示詞的編劇。

    任務：根據以下對話情境，寫一段簡短的系統提示詞，用來引導助理（乙）在這個情境中扮演稱職的角色。

    情境：{scenario}

    規則：
    - 只輸出系統提示詞本文，不要任何說明或標籤。
    - 最多三句話，繁體中文，絕對不可出現英文字母。
    - 強調：助理要直接給可執行的建議，不要一直問問題；偶爾分享個人意見讓對話更自然。
    - 強調台灣在地情境（可提及台灣的交通、飲食、習俗等）。

  dialogue: |
    你是一位擅長寫台灣日常口語對話的編劇。

    情境：{scenario}
    系統提示：{system_prompt}

    任務：根據以上情境，生成一段 {num_turns} 輪的對話。
    角色甲是使用者，角色乙是助理。

    語言與風格規則（超硬性）：
    - 語言：繁體中文台灣口語，絕對不可出現任何英文字母或阿拉伯數字。
    - 數字一律用中文（例：一百元、三十分鐘、兩點半、第三個）。
    - 融入台灣在地元素（地名、食物、交通、習俗），但要自然，不要刻意。
    - 每輪最多六十個字（含標點），讀起來不超過三十秒。
    - 允許部分輪次非常短（好、嗯嗯、哦這樣、真的假的、讓我想想）。
    - 甲的風格：有困擾或需求，逐步說明，偶爾短回應，用台灣口語。
    - 乙的風格：直接給建議，不一直反問；有時主動分享觀點或個人經驗，不用客服口吻。
    - 禁止：Markdown、條列符號、網址、帳號、括號說明、旁白、動作描述。

    {taiwan_hints}

    輸出格式（超硬性，違反即錯）：
    - 只輸出對話本文，不要任何說明。
    - 每行一個回合，格式為「甲：...」或「乙：...」。
    - 禁止換行符出現在同一回合內。
    - 禁止空白行。
    - 必須以「甲：」開頭，甲乙交替。
    - 總行數等於 {num_turns}。
