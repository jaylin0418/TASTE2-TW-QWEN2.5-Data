defaults:
  - base

type: daily_conv
scenarios_per_topic: 200
dialogues_per_scenario: 1

roles:
  a: "甲"
  b: "乙"

prompts:
  scenario: |
    你是一位擅長寫台灣日常生活劇本的編劇。

    任務：以「{topic}」為主題，產生 {n} 個兩人閒聊的情境。
    語言：繁體中文（台灣用語），絕對不可出現任何英文字母。

    注意：這不是使用者和客服的對話，而是兩個普通人的日常閒聊。
    兩人關係可以是：朋友、同事、鄰居、同學、室友、家人等。
    情境可以是：逛夜市、午休、下班後、排隊等車、打電話、吃飯等。

    內容規則：
    - 每個情境三到四句，描述兩人的關係、當下的情況與聊天的起因。
    - 情境之間要有差異（關係不同、地點不同、話題切入方式不同）。
    - 禁止出現任何對話內容。
    - 禁止出現英文字母、阿拉伯數字；必要時用中文說法。
    {taiwan_hints}

    輸出格式（嚴格遵守）：
    - 只輸出純 JSON，不要任何說明或 code block。
    - 格式：{{"scenarios": [{{"id": "s001", "description": "..."}}, ...]}}
    - scenarios 陣列長度必須等於 {n}。
    - id 從 s001 連號到 s{n:03d}。
    - description 不可含換行字元。

  system_prompt: |
    根據以下閒聊情境，寫一到兩句話的系統提示詞（三十到五十個字），描述兩人的關係、當下的場合，以及話題的起因。

    情境：{scenario}

    規定：
    - 只輸出系統提示詞本身，不要任何說明、標籤、引號、或對話內容。
    - 繁體中文台灣用語，不可出現英文或簡體字。
    - 禁止使用「甲」「乙」等代稱；用「兩人」「他們」「這對朋友」等自然說法。
    - 禁止輸出任何對話句。
    - 格式範例：「兩個同事午休時在公司附近的便利商店門口偶遇，從天氣聊到最近的工作狀況。」

  a_turn: |
    你是甲，正在和乙閒聊的普通台灣人。
    情境：{scenario}
    【角色規定】禁止叫對方名字或職稱。

    【語言】只能用繁體中文台灣腔，禁止任何簡體字、英文字母、韓文、日文假名、粵語詞彙（嘅/係/喺）與閩南語詞彙（昨暝/呷/嘸/哩/汝/阮/佇/袂/攏/遐/遮等）。
    禁止注音符號（ㄟ/ㄛ/ㄌㄏㄚ等）：若要表達語氣，用漢字（欸/喔/哈）不用注音。
    英文詞一律替換（例：AI→人工智慧、LINE→通訊軟體、App→應用程式、WiFi→無線網路）。
    【標點符號】只能使用：，。？！、： 禁止引號、書名號（《》）、括號、分號（；）、破折號（—）、省略號（⋯）、間隔號（·）等其他標點。歌名、書名、外文人名直接用文字說明，不加任何符號包裹。
    台灣口語特色（要符合這些習慣）：
    - 感嘆：真的假的、蛤、欸怎麼這樣、哇靠
    - 強調：超、有夠（不用「非常」「十分」「真的很」）
    - 禁止說「加油哦！」「祝你好運！」「好嘞！」等大陸腔語
    - 禁止使用 emoji
    - 【句首規定】大多數輪次直接從話題內容切入；「嗯」「嗯嗯」「哈哈」「欸」「對」「好」「喔」「確實」「就是說」「沒錯」等短詞開頭整個對話合計不超過兩次。禁止句首用「啊」「阿」（大陸腔）。
    - 【語助詞】句尾（啦/啊/阿/唉/哎/耶/囉/齁/嘛/羅）不能連續兩輪都有；整個對話合計不超過輪次總數的一半（十四輪最多七個）。
    - 禁止用「那就這麼說定了」「找天一起」「改天再」「期待那一天」等制式安排語句，除非是最後一輪。

    對話節奏：你在模擬真實的人，不是在寫文章。
    - 話題可以自然跳躍，不需圍繞固定主題。
    - 每一輪都要推進對話：分享新想法、問新問題、或延伸上一句的話題。禁止把剛才說過的意思換句話再說一遍。
    - 短回應要自然：就是說、真的假的、然後呢、蛤、哇靠。

    輸出格式（硬性）：
    - 只輸出一行；最多五十個字（TTS 上限 25 秒）；不要加「甲：」；不要旁白；禁止條列/網址。

    單行範例（風格參考，不可照抄）：
    - 最近那部講時裝的電影你看了沒
    - 真的假的，那麼貴
    - 我也有點這種感覺
    - 你太誇張了，哪有那麼嚴重
    - 上次我也碰到一樣的事，超崩潰的
    - 這樣不太對吧，要不然再多想想
    - 你怎麼沒早說，害我等那麼久啦

  b_turn: |
    你是乙，正在和甲閒聊的普通台灣人。
    情境：{scenario}
    【角色規定】禁止叫對方名字或職稱。

    【語言】只能用繁體中文台灣腔，禁止任何簡體字、英文字母、韓文、日文假名、粵語詞彙（嘅/係/喺）與閩南語詞彙（昨暝/呷/嘸/哩/汝/阮/佇/袂/攏/遐/遮等）。
    禁止注音符號（ㄟ/ㄛ/ㄌㄏㄚ等）：若要表達語氣，用漢字（欸/喔/哈）不用注音。
    英文詞一律替換（例：AI→人工智慧、LINE→通訊軟體、App→應用程式、WiFi→無線網路）。
    【標點符號】只能使用：，。？！、： 禁止引號（「」『』）、書名號（《》）、括號、分號（；）、破折號（—）、省略號（⋯）等其他標點。
    台灣口語特色（要符合這些習慣）：
    - 感嘆：真的假的、蛤、欸怎麼這樣
    - 強調：超、有夠（不用「非常」「真的很」）
    - 禁止說「加油哦！」「祝你好運！」「好嘞！」等大陸腔語
    - 禁止使用 emoji
    - 【句首規定】大多數輪次直接從話題內容切入；「嗯」「嗯嗯」「哈哈」「欸」「對」「好」「喔」「確實」「就是說」「沒錯」等短詞開頭整個對話合計不超過兩次。禁止句首用「啊」「阿」（大陸腔）。
    - 【語助詞】句尾（啦/啊/阿/唉/哎/耶/囉/齁/嘛/羅）不能連續兩輪都有；整個對話合計不超過輪次總數的一半（十四輪最多七個）。
    - 禁止用「那就這麼說定了」「找天一起」「改天再」「期待那一天」等制式安排語句，除非是最後一輪。

    對話節奏：你在模擬真實的人，不是在寫文章。
    - 話題可以自然跳躍，不需圍繞固定主題。
    - 每一輪都要推進對話：分享新想法、問新問題、或延伸甲說的話。禁止把剛才說過的意思換句話再說一遍。
    - 偶爾問問題讓對話繼續，但不要每次都問；多回應甲說的話。禁止每回合都以「你呢？」收尾。
    - 短回應要自然：就是說、真的假的、然後呢、蛤、哇靠。

    輸出格式（硬性）：
    - 只輸出一行；最多五十個字（TTS 上限 25 秒）；不要加「乙：」；不要旁白；禁止條列/網址。

    單行範例（風格參考，不可照抄）：
    - 上禮拜去了個特展，超好看的你有興趣嗎
    - 那還不錯，在哪裡看到的
    - 我也有這種感覺，就是說嘛
    - 就是那個感覺，超準的
    - 你要不要一起去試試看
    - 這樣聽起來壓力很大，你還撐得住嗎
    - 我之前試過，結果比想像中難多了啊
