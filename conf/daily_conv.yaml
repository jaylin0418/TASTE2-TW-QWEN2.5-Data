defaults:
  - base

type: daily_conv
scenarios_per_topic: 200
dialogues_per_scenario: 1

roles:
  speaker_a: "甲"
  speaker_b: "乙"

prompts:
  scenario: |
    你是一位擅長寫台灣日常生活劇本的編劇。

    任務：以「{topic}」為主題，產生 {n} 個兩人閒聊的情境。
    語言：繁體中文（台灣用語），絕對不可出現任何英文字母。

    注意：這不是使用者和客服的對話，而是兩個普通人的日常閒聊。
    兩人關係可以是：朋友、同事、鄰居、同學、室友、家人等。
    情境可以是：逛夜市、午休、下班後、排隊等車、打電話、吃飯等。

    內容規則：
    - 每個情境三到四句，描述兩人的關係、當下的情況與聊天的起因。
    - 情境之間要有差異（關係不同、地點不同、話題切入方式不同）。
    - 禁止出現任何對話內容。
    - 禁止出現英文字母、阿拉伯數字；必要時用中文說法。
    {taiwan_hints}

    輸出格式（嚴格遵守）：
    - 只輸出純 JSON，不要任何說明或 code block。
    - 格式：{{"scenarios": [{{"id": "s001", "description": "..."}}, ...]}}
    - scenarios 陣列長度必須等於 {n}。
    - id 從 s001 連號到 s{n:03d}。
    - description 不可含換行字元。

  system_prompt: |
    你是一位擅長寫系統提示詞的編劇。

    任務：根據以下閒聊情境，寫一段簡短的系統提示詞，引導甲和乙進行自然的日常閒聊。

    情境：{scenario}

    規則：
    - 只輸出系統提示詞本文，不要任何說明或標籤。
    - 最多三句話，繁體中文，絕對不可出現英文字母。
    - 強調：這是朋友或熟人之間的閒聊，語氣隨意自然；話題可以自然跳躍。
    - 不需要解決任何問題，就是純聊天。

  dialogue: |
    你是一位擅長寫台灣日常口語閒聊的編劇。

    情境：{scenario}
    提示：{system_prompt}

    任務：根據以上情境，生成一段 {num_turns} 輪的閒聊對話。
    甲和乙是兩個普通人，不是使用者和客服。

    語言與風格規則（超硬性）：
    - 語言：繁體中文台灣口語，絕對不可出現任何英文字母或阿拉伯數字。
    - 數字一律用中文（例：一百元、三十分鐘、兩點半）。
    - 融入台灣在地元素，讓對話有真實的台灣生活感。
    - 每輪最多六十個字（含標點），讀起來不超過三十秒。
    - 非常鼓勵短回應（好啊、嗯、哈哈、真的假的、然後呢）。
    - 話題可以自然跳躍，不需要圍繞同一個主題一直聊。
    - 不需要解決任何問題，就是兩個人在閒聊。
    - 禁止：Markdown、條列符號、網址、帳號、括號說明、旁白、動作描述。

    {taiwan_hints}

    輸出格式（超硬性）：
    - 只輸出對話本文，不要任何說明。
    - 每行一個回合，格式為「甲：...」或「乙：...」。
    - 禁止換行符出現在同一回合內。
    - 禁止空白行。
    - 必須以「甲：」開頭，甲乙交替。
    - 總行數等於 {num_turns}。
