defaults:
  - base

type: speed_ua
scenarios_per_topic: 200
dialogues_per_scenario: 1

roles:
  a: "User"
  b: "Agent"

gen:
  temperature: 0.90
  top_p: 0.92
  repetition_penalty: 1.10

prompts:
  scenario: |
    你是一位擅長寫台灣日常情境的編劇。

    任務：以「{topic}」為主題，產生 {n} 個多樣化的對話情境。
    語言：繁體中文（台灣用語），絕對不可出現任何英文字母。

    設定：使用者正在用手機或電腦跟一個人工智慧助理聊天，向它提問或請求協助。
    情境重點：使用者遇到什麼問題或有什麼需求，讓他想開口問人工智慧助理。

    內容規則：
    - 每個情境三到四句，描述使用者的身分、當下狀況，以及想問人工智慧助理的事。
    - 情境之間要有差異（使用者的年齡、身分、時間、問題類型、複雜程度等）。
    - 禁止出現任何對話內容（不要出現甲說、乙說或引號對話）。
    - 禁止出現英文字母、阿拉伯數字；必要時用中文說法（例：兩點半、三十分鐘）。
    - 禁止網址、帳號、代碼、序號。
    {taiwan_hints}

    輸出格式（嚴格遵守）：
    - 只輸出純 JSON，不要任何說明或 code block。
    - 格式：{{"scenarios": [{{"id": "s001", "description": "..."}}, ...]}}
    - scenarios 陣列長度必須等於 {n}。
    - id 從 s001 連號到 s{n:03d}。
    - description 不可含換行字元。

  system_prompt: |
    根據以下情境，寫一到兩句話的系統提示詞（三十到五十個字），說明這個人工智慧助理的領域專長，以及在這個情境下的具體任務。

    情境：{scenario}

    規定：
    - 只輸出系統提示詞本身，不要任何說明、標籤、引號、或對話內容。
    - 繁體中文台灣用語，不可出現英文或簡體字。
    - 禁止輸出任何對話句（例如「甲：…」或「乙：…」）。
    - 格式固定以「你是一個人工智慧助理」開頭，後面說明專長領域與任務。

  a_turn: |
    你是 User，一個正在用人工智慧助理解決問題的台灣人。
    情境：{scenario}

    【角色規定】你是情境裡那個找人工智慧助理幫忙的人，不是助理。
    - 禁止向 Agent 推薦工具、提供資訊或分享知識，那是 Agent 的工作。
    - 只從自己的需求、困擾、感受出發說話。
    - 禁止說「你可以…」「建議你…」「推薦你…」等助理語氣。
    - 禁止把 Agent 說過的話換句話重述一遍。
    - 禁止說出自己的名字，也禁止叫對方名字。

    【語言】只能用繁體中文台灣腔，禁止任何簡體字、英文字母。
    英文詞一律替換（AI→人工智慧、App→應用程式、LINE→通訊軟體、WiFi→無線網路）。
    台灣口語：真的假的、哇、欸怎麼這樣、蛤；超、有夠；捷運、機車、便當。
    禁止「加油哦！」「好嘞！」等大陸腔；禁止 emoji。
    【標點符號】只能使用：，。？！、： 禁止引號、書名號、括號、分號、破折號、省略號。

    【速度規則（嚴格遵守）】
    - 只有本輪出現【速度提示】時，才可以在話裡提到語速，速度請求要自然融入，不要獨立成句。
    - 沒有【速度提示】的輪次，絕對不可以主動提任何語速要求，就像正常說話一樣。
    例如有提示：「欸你說快點，那個要怎麼操作？」
    例如沒提示：「那我要去哪裡設定啊？」（完全不提速度）

    【禁止道別】任何輪次絕對禁止道別語：再見、拜拜、掰掰、下次見、保重、晚安、
    謝謝你的幫助、期待下次、有需要再來、路上小心等，一律禁止。
    對話結束前繼續追問細節或說感受，不要道別填充。

    輸出格式（硬性）：
    - 只輸出一行；最多五十個字；不要加 User:；不要旁白；禁止條列。

  b_turn: |
    {system_prompt}

    情境：{scenario}
    【角色定位】你是人工智慧助理，根據知識給出建議與資訊，協助 User 解決問題。
    - 禁止叫對方名字。
    - 如果不確定，誠實說「我不確定，但你可以試試…」。

    ★ 任何輪次絕對禁止：「祝你…」「希望你…」「有需要隨時來問」「很高興能幫上忙」
      「歡迎再來」「隨時歡迎詢問」「希望有幫助」「路上小心」「再見」「拜拜」
      「掰掰」「下次見」「保重」「期待下次」「有空再聊」「晚安」

    【語言】只能用繁體中文台灣腔，禁止任何簡體字、英文字母。
    英文詞一律替換。台灣口語，不要文謅謅；禁止「哦」「嘅」「好嘞」等大陸腔；禁止 emoji。
    【標點符號】只能使用：，。？！、： 禁止引號、書名號、括號、分號、破折號、省略號。
    - 大多數輪次直接從答案切入，不要每輪用「好的」「確實」等短詞墊開頭。

    【速度執行】請根據 User 最後一次提出的語速要求，以對應的語速回答。
    不需要在文字裡說明自己的語速，直接按要求說話即可。

    輸出格式（硬性）：
    - 只輸出一行；最多五十個字；不要加 Agent:；不要旁白；禁止條列。
