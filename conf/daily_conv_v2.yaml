defaults:
  - base

type: daily_conv
scenarios_per_topic: 200
dialogues_per_scenario: 1

# v2：更強調情緒起伏、話題跳躍、台灣口語特色
roles:
  speaker_a: "甲"
  speaker_b: "乙"

gen:
  temperature: 0.92
  top_p: 0.93

prompts:
  scenario: |
    你是一位台灣生活風格頻道的腳本作家，擅長捕捉台灣人真實的日常對話。

    任務：以「{topic}」為主題，構思 {n} 個台灣人日常閒聊的具體情境。
    語言：繁體中文（台灣口語），絕對不可出現任何英文字母。

    情境要求：
    - 要有明確的時間和地點感（下班後、假日午後、等捷運時、吃飯中間等）。
    - 兩人有一點個性差異（一個比較健談，一個比較務實；或一個樂觀，一個愛抱怨）。
    - 對話的起點要自然，不要太刻意（可以是看到某個東西、剛發生的小事、突然想到的）。
    - 三到四句描述情境，禁止出現對話內容。
    - 禁止英文字母、阿拉伯數字。
    {taiwan_hints}

    輸出格式（嚴格遵守）：
    - 只輸出純 JSON，不要任何說明或 code block。
    - 格式：{{"scenarios": [{{"id": "s001", "description": "..."}}, ...]}}
    - scenarios 陣列長度必須等於 {n}，id 從 s001 連號。
    - description 不可含換行字元。

  system_prompt: |
    你是一位台灣生活風格頻道的腳本作家。

    任務：根據以下情境，寫一段引導詞，說明這段對話的氛圍和兩人的個性。

    情境：{scenario}

    規則：
    - 只輸出引導詞本文，不要任何標籤。
    - 最多三句話，繁體中文，絕對不可出現英文字母。
    - 要說明：甲的個性、乙的個性、這段對話的情緒基調（輕鬆、抱怨、興奮、感慨⋯⋯）。

  dialogue: |
    你是一位台灣生活風格頻道的腳本作家，要寫一段有生活感的閒聊對話。

    情境：{scenario}
    氛圍說明：{system_prompt}

    任務：生成 {num_turns} 輪閒聊對話。甲和乙不是在解決問題，就是在聊天。

    風格規則（超硬性）：
    - 語言：繁體中文台灣口語，絕對不可出現任何英文字母或阿拉伯數字。
    - 數字用中文，地名用台灣習慣說法。
    - 每輪最多六十個字，讀起來不超過三十秒。
    - 話題可以在中途自然跳躍（從食物聊到旅遊，從旅遊聊到家人）。
    - 非常鼓勵：短回應（嗯、對啊、哈哈、真的假的）、感嘆（欸、哇、不會吧）、吐槽。
    - 可以有一點情緒起伏（有點驚訝、有點抱怨、有點感動）。
    - 禁止：解決問題的語氣、Markdown、條列、網址、括號說明、旁白。
    {taiwan_hints}

    輸出格式（超硬性）：
    - 只輸出對話本文。
    - 每行格式：「甲：...」或「乙：...」。
    - 禁止同一回合換行，禁止空白行。
    - 從甲開始，甲乙交替，共 {num_turns} 行。
