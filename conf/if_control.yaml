defaults:
  - base

type: if_control
min_tasks: 3
max_tasks: 6

roles:
  instructor: "甲"
  executor: "乙"

# 14 種題型，和 if_data 對齊；gen_if_control.py 用加權抽樣
# 權重高 = 更接近推論集核心題型（朗讀/列舉/數數/序列）
if_categories:
  朗讀: 8
  列舉: 4
  數數: 3
  倒數: 3
  序列: 3
  複述: 3
  描述: 3
  感受描述: 2
  比較: 2
  舉例: 2
  說出喜好: 2
  問答: 3
  反義詞: 1
  同義詞: 1

prompts:
  dialogue: |
    生成一段對話，甲依序出 {num_tasks} 個語言指令任務，每個任務同時指定速度，乙照速度執行。

    任務類別（依序）：{task_list}
    速度（依序）：{speed_list}

    【任務內容生成原則】請根據每個題型自由發揮，不要每次都用一樣的句子或主題：
    - 朗讀、複述：甲給一句多元的句子讓乙念，五到二十一個字，對齊推論集句子長度分布
    - 列舉：指定不同的類別和數量（動物、食物、城市、職業、節日等）
    - 數數：指定不同的起始和結束數字（最多十三個數字）
    - 倒數：同上但倒著數
    - 序列：星期、月份、四季、生肖、彩虹顏色、一天時段等各種序列
    - 描述：各種場景、地點、氛圍的短篇描述
    - 感受描述：描述某種感官體驗或情緒感受（踩進泥巴、吃到酸的、迷路的感覺等）
    - 比較：比較兩樣事物哪個更好或更適合，簡短說明
    - 舉例：舉一個某類事物的具體例子
    - 說出喜好：問最喜歡、最不喜歡、最想要哪種事物
    - 問答：台灣文化、地理、常識等知識型問題
    - 反義詞、同義詞：多元的詞語，不要重複

    【速度措辭】每次都要不同，自然口語：
    快速：說快一點、加快速度、快點說、用快的速度、請加速說、趕快說出、飛快地說⋯⋯
    慢速：放慢說、慢慢來、說慢一點、用慢的速度、放慢腳步說、緩緩地說⋯⋯
    正常（需明確說出）：照正常速度、不用特別快或慢、普通速度、一般速度就好、照平常說⋯⋯
    （不提速度）：甲直接給任務指令，完全不提速度，就像日常對話一樣自然下指令。

    台灣在地化（盡量）：
    - 用台灣慣用詞：橘子（非橙子）、義大利（非意大利）、裡（非里）
    - 列舉城市優先台灣城市，問答優先台灣文化地理
    {taiwan_hints}

    規則：
    - 語言：繁體中文，不可出現英文字母或阿拉伯數字，數字用中文。
    - 標點符號只能用：，。？！、：（禁止引號、書名號、括號、分號、破折號、省略號）
    - 每輪最多六十個字。
    - 乙的回答精準符合甲的任務與速度要求，不多說廢話。
    - 禁止：Markdown、條列符號、括號說明、旁白。

    範例（風格參考，不要照抄）：
    甲：說快一點，請說這句話，時間是最寶貴的資源。
    乙：時間是最寶貴的資源。
    甲：好，現在慢慢從一數到八。
    乙：一、二、三、四、五、六、七、八。
    甲：照正常速度說三種台灣的節日。
    乙：春節、端午節、中秋節。

    輸出格式（嚴格遵守）：
    - 只輸出對話本文，不要任何說明。
    - 每行格式：甲：... 或 乙：...
    - 甲乙嚴格交替，不可連續同一角色。
    - 從甲開始，共 {num_turns} 行（甲 {num_tasks} 行，乙 {num_tasks} 行）。
    - 禁止同一回合換行，禁止空白行。
