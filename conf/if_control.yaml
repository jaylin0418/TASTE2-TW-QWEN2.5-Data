defaults:
  - base

type: if_control
scenarios_per_topic: 40
dialogues_per_scenario: 1
min_tasks: 3
max_tasks: 6

roles:
  instructor: "甲"
  executor: "乙"

speed:
  fast_factor: 0.77
  slow_factor: 1.33

# IF categories（同 if_data.yaml，但每個任務都附帶速度指令）
if_categories:
  - 朗讀
  - 數數
  - 序列
  - 倒序
  - 列舉
  - 重複
  - 數字朗讀
  - 時間日期朗讀
  - 格式限制
  - 否定限制
  - 必要詞彙
  - 替換
  - 選擇
  - 排序
  - 比較
  - 完成句子
  - 短篇描述
  - 短篇生成
  - 簡單計算

prompts:
  dialogue: |
    你是一位擅長設計語言任務的編劇。

    任務：生成一段 {num_turns} 輪的對話。
    甲（出題者）依序出 {num_tasks} 個語言指令任務，每個任務都要指定說話速度（快、慢、正常）。
    乙（執行者）照著做，速度要符合甲的要求。

    要使用的任務類別（依序）：{task_list}
    每個任務的速度指令（依序）：{speed_list}

    速度指令句型要多樣化，不要每次都一樣。以下是參考例句（不要照抄，要自己變化）：
    快速類：「用快一點的速度說⋯⋯」「加快速度，⋯⋯」「說快一點，⋯⋯」「用快速的方式⋯⋯」
    慢速類：「用很慢的速度說⋯⋯」「慢慢說，⋯⋯」「放慢速度，⋯⋯」「說慢一點，⋯⋯」
    正常類：「用正常速度⋯⋯」「好，照一般速度⋯⋯」「不用特別快或慢，⋯⋯」

    規則（超硬性）：
    - 語言：繁體中文台灣口語，絕對不可出現任何英文字母或阿拉伯數字。
    - 數字一律用中文。
    - 內容要跟台灣日常有關（可以用台灣地名、食物、習俗等）。
    - 每輪最多六十個字，讀起來不超過三十秒。
    - 乙的回答要符合甲的指令，精簡準確。
    - 禁止：Markdown、條列、網址、括號說明、旁白。

    對話範例風格（僅供參考，不要照抄）：
    甲：用快一點的速度說這句話：台灣的夜市非常熱鬧。
    乙：台灣的夜市非常熱鬧。
    甲：好，現在放慢速度，從一數到五。
    乙：一、二、三、四、五。
    甲：用正常速度列出三種台灣水果。
    乙：芒果、蓮霧、鳳梨。

    輸出格式（超硬性）：
    - 只輸出對話本文。
    - 每行格式：「甲：...」或「乙：...」。
    - 禁止同一回合換行，禁止空白行。
    - 從甲開始，甲乙交替，共 {num_turns} 行。
