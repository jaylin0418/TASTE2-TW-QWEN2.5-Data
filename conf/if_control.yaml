defaults:
  - base

type: if_control
min_tasks: 3
max_tasks: 6

roles:
  instructor: "甲"
  executor: "乙"

# 同 if_data 的 25 個類別（字串列表，供 gen_if_control.py 使用）
if_categories:
  - 朗讀
  - 數數
  - 序列
  - 倒序
  - 列舉
  - 重複
  - 拼讀
  - 數字朗讀
  - 時間日期朗讀
  - 格式限制
  - 否定限制
  - 必要詞彙
  - 詞彙抽取
  - 替換
  - 過濾
  - 選擇
  - 排序
  - 比較
  - 完成句子
  - 轉換
  - 短篇描述
  - 短篇生成
  - 簡單計算
  - 條件推理
  - 多步驟

prompts:
  dialogue: |
    生成一段對話，甲依序出 {num_tasks} 個語言指令任務，每個任務都要求乙用特定速度執行。

    任務類別（依序）：{task_list}
    速度指令（依序）：{speed_list}

    速度措辭要多樣，不要每次都一樣：
    快速：「說快一點，⋯⋯」「加快速度⋯⋯」「快速說出⋯⋯」
    慢速：「放慢說，⋯⋯」「慢慢來，⋯⋯」「用很慢的速度⋯⋯」
    正常：「照正常速度⋯⋯」「不用特別快或慢，⋯⋯」「普通速度說⋯⋯」

    規則：
    - 語言：繁體中文，不可出現英文字母或阿拉伯數字。
    - 數字一律用中文。
    - 內容選材自然，不要刻意強調地名或食物。
    - 每輪最多六十個字。
    - 乙的回答精準符合甲的任務與速度要求，不多說廢話。
    - 甲的措辭每次要不同。
    - 禁止：Markdown、條列符號、括號說明、旁白。

    範例（風格參考，不要照抄）：
    甲：快點唸這句話：春眠不覺曉。
    乙：春眠不覺曉。
    甲：好，現在慢慢從一數到五。
    乙：一、二、三、四、五。
    甲：照正常速度說三種顏色。
    乙：紅色、藍色、綠色。

    輸出格式（嚴格遵守）：
    - 只輸出對話本文，不要任何說明。
    - 每行格式：「甲：...」或「乙：...」。
    - 【最重要】必須嚴格甲乙交替：甲、乙、甲、乙……不可連續出現同一角色。
    - 從甲開始，共 {num_turns} 行（甲 {num_tasks} 行，乙 {num_tasks} 行，交替出現）。
    - 禁止同一回合換行，禁止空白行。
